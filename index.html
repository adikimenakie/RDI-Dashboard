<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --gold: #e3b341;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --radius: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .sidebar-logo p {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text3);
    padding: 0 8px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text2);
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(88, 166, 255, 0.12);
    color: var(--accent);
    border-color: rgba(88, 166, 255, 0.2);
    font-weight: 500;
  }

  .nav-icon { width: 16px; font-size: 15px; flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; overflow-x: auto; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
  }

  .topbar-spacer { flex: 1; }

  /* SELECT */
  .select-wrap {
    position: relative;
    min-width: 260px;
  }
  .select-wrap select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 36px 9px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .select-wrap select:hover, .select-wrap select:focus {
    border-color: var(--accent);
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    pointer-events: none;
    font-size: 12px;
  }

  /* CONTENT */
  .content { padding: 28px; }

  /* VIEW */
  .view { display: none; }
  .view.active { display: block; }

  /* INFO CARDS */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: border-color 0.2s;
  }
  .info-card:hover { border-color: var(--accent); }

  .info-card-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .info-card-value {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
  }
  .info-card-value.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }
  .info-card-value.gold { color: var(--gold); font-weight: 600; }

  .info-card.wide {
    grid-column: 1 / -1;
  }

  .description-text {
    font-size: 13.5px;
    color: var(--text2);
    line-height: 1.65;
    max-height: 120px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .description-text::-webkit-scrollbar { width: 4px; }
  .description-text::-webkit-scrollbar-track { background: transparent; }
  .description-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--text);
  }
  .section-badge {
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.25);
    color: var(--accent);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .table-wrap::-webkit-scrollbar { height: 6px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--surface); }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    min-width: 1400px;
  }

  thead th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text2);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }

  thead th.num { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(88,166,255,0.04); }

  td {
    padding: 10px 12px;
    color: var(--text);
    vertical-align: middle;
    white-space: nowrap;
  }

  td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  td.num.highlight { color: var(--accent2); font-weight: 500; }
  td.num.total { color: var(--gold); font-weight: 600; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 500;
  }
  .badge-coo { background: rgba(63,185,80,0.15); color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }
  .badge-ben { background: rgba(88,166,255,0.12); color: var(--accent); border: 1px solid rgba(88,166,255,0.25); }
  .badge-other { background: rgba(247,129,102,0.12); color: var(--accent3); border: 1px solid rgba(247,129,102,0.25); }
  .badge-uni { background: rgba(227,179,65,0.12); color: var(--gold); border: 1px solid rgba(227,179,65,0.25); font-size: 10px; }

  .pct-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
  }
  .pct-fill {
    width: 50px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .pct-fill-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .tfoot-row td {
    background: var(--surface2);
    font-weight: 600;
    color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-top: 2px solid var(--border);
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* COMING SOON */
  .coming-soon {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 60px;
    text-align: center;
    color: var(--text3);
  }
  .coming-soon-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .coming-soon h3 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text2); margin-bottom: 8px; }
  .coming-soon p { font-size: 13px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    color: var(--text2);
  }



  /* EFFORT VIEW */
  .effort-header { margin-bottom: 18px; }
  .effort-kpis { display: flex; gap: 12px; flex-wrap: wrap; }
  .effort-kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    min-width: 130px;
  }
  .effort-kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 4px; }
  .effort-kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text); }

  .effort-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .effort-table-wrap::-webkit-scrollbar { height: 6px; }
  .effort-table-wrap::-webkit-scrollbar-track { background: var(--surface); }
  .effort-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .effort-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }

  .effort-table thead th {
    background: var(--surface2);
    padding: 9px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text2);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ef-th-no { width: 40px; text-align: center; }
  .ef-th-partner { width: 80px; min-width: 80px; max-width: 80px; }
  .ef-th-short { width: 80px; min-width: 80px; max-width: 80px; }
  .ef-th-country { width: 60px; text-align: center; }
  .ef-th-wp { width: 56px; text-align: right; color: var(--accent) !important; }
  .ef-th-total { width: 110px; text-align: right; color: var(--gold) !important; }

  .ef-row { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .ef-row:hover { background: rgba(88,166,255,0.04); }

  .ef-no { text-align: center; color: var(--text3); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 8px; }
  .ef-partner {
    padding: 9px 10px;
    color: var(--text);
    font-size: 12px;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: default;
    position: relative;
  }
  #ef-tooltip {
    display: none;
    position: fixed;
    background: #1c2128;
    border: 1px solid #58a6ff55;
    color: #e6edf3;
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 8px;
    max-width: 380px;
    white-space: normal;
    line-height: 1.55;
    z-index: 9999;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55);
    pointer-events: none;
  }
  .ef-short { padding: 9px 8px; width: 80px; min-width: 80px; max-width: 80px; overflow: hidden; }
  .ef-short-badge {
    display: inline-block;
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.2);
    color: var(--accent);
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }
  .ef-country { text-align: center; color: var(--text2); font-size: 11.5px; padding: 9px 8px; }
  .ef-wp-cell {
    text-align: right;
    padding: 9px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text);
    transition: background 0.2s;
    border-left: 1px solid rgba(48,54,61,0.5);
  }
  .ef-total { padding: 9px 12px; text-align: right; }
  .ef-total-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .ef-total-wrap span { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); font-weight: 600; }
  .ef-bar { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .ef-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s; }

  .ef-totals-row td {
    background: var(--surface2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--gold);
    border-top: 2px solid var(--border);
    padding: 9px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: right;
  }
  .ef-totals-row td:first-child { text-align: left; }
  .ef-totals-row .ef-wp-cell { border-left: 1px solid rgba(48,54,61,0.5); }

  /* UNI SYSTEMS VIEW */

  .uni-view-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .uni-view-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    flex: 1;
  }
  .uni-header-bar {
    margin-bottom: 18px;
  }
  .uni-summary-pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .uni-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .uni-pill-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
  }
  .uni-pill-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .uni-section {
    margin-bottom: 40px;
  }
  .uni-section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .uni-entity-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 5px 16px;
    border-radius: 8px;
    border: 1px solid;
  }
  .uni-section-meta {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .uni-section-meta strong { font-weight: 600; }
  .uni-tables-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .uni-table-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-width: 0;
  }
  .uni-table-label {
    background: var(--surface2);
    padding: 7px 14px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .uni-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 0;
  }
  .uni-table thead th {
    background: var(--surface2);
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .uni-table thead th.num { text-align: right; }
  .uni-table tbody tr.uni-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .uni-table tbody tr.uni-row:hover { background: rgba(88,166,255,0.04); }
  .uni-table tbody tr.uni-row-empty {
    border-bottom: 1px solid var(--border);
    opacity: 0.4;
  }
  .uni-table td {
    padding: 8px 10px;
    color: var(--text);
    white-space: nowrap;
    vertical-align: middle;
  }
  .uni-table td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
    font-size: 11.5px;
  }
  .uni-totals-row td {
    background: var(--surface2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--gold) !important;
    border-top: 2px solid var(--border);
    padding: 9px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .uni-totals-row td.num { text-align: right; }



  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .view.active { animation: fadeIn 0.25s ease; }

  /* ── EXPORT BUTTON ── */
  .export-btn {
    display:inline-flex;align-items:center;gap:7px;padding:7px 14px;
    background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.3);
    color:var(--accent2);border-radius:7px;font-family:'DM Sans',sans-serif;
    font-size:12.5px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;
  }
  .export-btn:hover{background:rgba(63,185,80,0.22);border-color:rgba(63,185,80,0.5);}
  .export-btn svg{flex-shrink:0;}

  /* ── PROJECT PER PARTNER ── */
  .pp-partner-header{display:flex;align-items:flex-start;justify-content:space-between;
    margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
  .pp-partner-name{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);margin-bottom:8px;}
  .pp-partner-meta{display:flex;gap:8px;flex-wrap:wrap;}
  .pp-meta-badge{background:var(--surface2);border:1px solid var(--border);color:var(--text2);
    font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
  .pp-tables-row{display:flex;gap:16px;align-items:flex-start;}
  .pp-table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:1;min-width:0;}
  .pp-table-label{background:var(--surface2);padding:7px 14px;font-size:10px;text-transform:uppercase;
    letter-spacing:1px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);}
  .pp-table{width:100%;border-collapse:collapse;font-size:13px;}
  .pp-table thead th{background:var(--surface2);padding:8px 14px;font-size:10px;text-transform:uppercase;
    letter-spacing:0.6px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);}
  .pp-table thead th.num{text-align:right;}
  .pp-row{border-bottom:1px solid rgba(48,54,61,0.6);transition:background 0.1s;}
  .pp-row:hover{background:rgba(88,166,255,0.04);}
  .pp-row-highlight td{background:rgba(227,179,65,0.06)!important;}
  .pp-label{padding:9px 14px;color:var(--text2);font-size:12.5px;}
  .pp-table td.num{text-align:right;padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);}


  /* ── PROJECT PER PARTNER ─────────────────────── */
  .pp-partner-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
  .pp-partner-name{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);margin-bottom:8px;}
  .pp-partner-meta{display:flex;gap:8px;flex-wrap:wrap;}
  .pp-meta-badge{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
  .pp-tables-row{display:flex;gap:16px;align-items:flex-start;}
  .pp-table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex:1;min-width:0;}

// EXPORT TO EXCEL
// ═══════════════════════════════════════════════════════════════════
function exportCurrentView() {
  const proj = document.getElementById('projectSelect').value;
  if (!proj) { alert('Επιλέξτε πρώτα ένα έργο.'); return; }
  const info = DATA.info[proj] || {};
  const budget = DATA.budget[proj] || [];
  const infoRows = [
    ['Field','Value'],
    ['Acronym', info.Acronym||''], ['Call', info.Call||''], ['Number', info.Number||''],
    ['Title', info.Title||''], ['Duration (months)', info.Duration||''],
    ['Indirect Rate', info.Indirectrate ? (info.Indirectrate*100).toFixed(0)+'%' : ''],
    ['Type of Action', info.Typeofaction||''], ['Topic', info.Topic||''],
    ['Keywords', info.Keywords1||''], ['Description', info.Description||''],
  ];
  const bh = ['Part.No','Org Name','Short','Country','UNI','Type',
    'Personnel A1/A2','Personnel A3','Personnel A4','Subcontracting',
    'Travel','Equipment','Other Goods','Financial Support','Internally Invoiced',
    'Indirect','Total Costs','Funding Rate %','Max Grant','% Other/Personnel','Participation %'];
  const budgetRows = [bh, ...budget.map(r => [
    r.partNo,r.orgName,r.shortName,r.country,r.uni||'',r.type,
    r.personnelA1,r.personnelA3,r.personnelA4,r.subcontracting,
    r.travel,r.equipment,r.otherGoods,r.financialSupport,r.internallyInvoiced,
    r.indirectCosts,r.totalCosts,
    r.fundingRate ? (r.fundingRate*100).toFixed(0)+'%' : '',
    r.maxGrant,
    r.pctOtherToPersonnel ? (r.pctOtherToPersonnel*100).toFixed(1)+'%' : '',
    r.participationPct ? (r.participationPct*100).toFixed(1)+'%' : '',
  ])];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoRows), 'Basic Info');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(budgetRows), 'Budget');
  XLSX.writeFile(wb, proj+'_dashboard.xlsx');
}

function exportUniView() {
  const entity = document.getElementById('uniEntitySelect').value;
  const projects = UNI_DATA.projects;
  const allEntities = UNI_DATA.entities;
  const entitiesToShow = entity === '__TOTAL__' ? allEntities : [entity];
  const allWPs = ['WP1','WP2','WP3','WP4','WP5','WP6','WP7','WP8','WP9','WP10'];
  function agg(proj) {
    const pd = UNI_DATA.data[proj]; if (!pd) return null;
    const r = {b:{personnelA1:0,travel:0,equipment:0,otherGoods:0,indirectCosts:0,totalCosts:0,maxGrant:0},e:{},t:0,ok:false};
    entitiesToShow.forEach(e => {
      const ed = pd.entities?.[e]; if (!ed) return; r.ok=true;
      Object.keys(r.b).forEach(k => r.b[k]+=(ed.budget?.[k]||0));
      allWPs.forEach(wp => r.e[wp]=(r.e[wp]||0)+(ed.effort?.[wp]||0));
      r.t+=ed.totalEffort||0;
    });
    return r;
  }
  const activeWPs = allWPs.filter(wp => projects.some(p => { const a=agg(p); return a&&a.e[wp]>0; }));
  const label = entity==='__TOTAL__'?'TOTAL':entity;
  const bRows = [['Project','Personnel A1/A2','Travel','Equipment','Other Goods','Indirect','Total Costs','Max Grant','Total PM','Avg PM (€)']];
  const eRows = [['Project',...activeWPs,'Total PM']];
  projects.forEach(proj => {
    const a=agg(proj); if (!a||!a.ok) return;
    bRows.push([proj,a.b.personnelA1,a.b.travel,a.b.equipment,a.b.otherGoods,a.b.indirectCosts,a.b.totalCosts,a.b.maxGrant,a.t,a.t>0?Math.round(a.b.personnelA1/a.t*100)/100:'']);
    eRows.push([proj,...activeWPs.map(wp=>a.e[wp]||0),a.t]);
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bRows), 'Budget '+label);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eRows), 'Effort '+label);
  XLSX.writeFile(wb, 'UniSystems_'+label.replace(' ','_')+'.xlsx');
}

function exportEffortView() {
  const proj = document.getElementById('effortProjectSelect').value;
  if (!proj) { alert('Επιλέξτε πρώτα ένα έργο.'); return; }
  const pd = EFFORT_DATA.data[proj]; if (!pd) return;
  const wps = pd.wps;
  const rows = [['No','Organisation','Short','Country',...wps,'Total PM'],
    ...pd.partners.map(p=>[p.partNo,p.orgName,p.short,p.country,...wps.map(wp=>p.wps[wp]||0),p.total]),
    ['','ΣΥΝΟΛΑ','','',...wps.map(wp=>pd.partners.reduce((s,p)=>s+(p.wps[wp]||0),0)),pd.partners.reduce((s,p)=>s+p.total,0)]
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Effort '+proj);
  XLSX.writeFile(wb, proj+'_effort.xlsx');
}

function exportPartnerView() {
  const proj = document.getElementById('partnerProjSelect').value;
  const short = document.getElementById('partnerBenSelect').value;
  if (!proj||!short) { alert('Επιλέξτε πρώτα έργο και beneficiary.'); return; }
  const pd = PARTNER_DATA.data[proj];
  const ben = pd?.beneficiaries?.[short]; if (!ben) return;
  const b = ben.budget||{};
  const wps = pd.wps||[];
  const eff = ben.effort||{};
  const bRows = [['Cost Category','Amount'],
    ['A. Personnel costs A1/A2',b.personnelA1||''],
    ['A. Personnel costs A3',b.personnelA3||''],
    ['A. Personnel costs A4',b.personnelA4||''],
    ['B. Subcontracting',b.subcontracting||''],
    ['C.1 Travel',b.travel||''],['C.2 Equipment',b.equipment||''],
    ['C.3 Other goods',b.otherGoods||''],['D.1 Financial support',b.financialSupport||''],
    ['D.2 Internally invoiced',b.internallyInvoiced||''],['E. Indirect',b.indirectCosts||''],
    ['Total costs',b.totalCosts||''],
    ['Funding rate %',b.fundingRate?(b.fundingRate*100).toFixed(0)+'%':''],
    ['Max Grant',b.maxGrant||''],
    ['% Other/Personnel',b.pctOtherToPersonnel?(b.pctOtherToPersonnel*100).toFixed(2)+'%':''],
    ['Participation %',b.participationPct?(b.participationPct*100).toFixed(2)+'%':''],
    ['Total PMs',ben.totalPM||''],['Avg PM rate (€/PM)',ben.avgPMrate||''],
  ];
  const eRows = [['Work Package','Person-Months'],...wps.map(wp=>[wp,eff[wp]||0]),['Total',ben.totalPM||0]];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bRows), 'Budget');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eRows), 'Effort');
  XLSX.writeFile(wb, proj+'_'+short+'.xlsx');
}

function initPartnerView() {
  var projSel = document.getElementById('partnerProjSelect');
  projSel.innerHTML = '<option value="">— Select a project —</option>';
  PARTNER_DATA.projects.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p; o.textContent = p; projSel.appendChild(o);
  });
  document.getElementById('partnerBenSelect').innerHTML = '<option value="">— Select project first —</option>';
  document.getElementById('partner-content').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Επιλέξτε έργο και beneficiary.</p></div>';
  var btn = document.getElementById('partner-export-btn');
  if (btn) btn.style.display = 'none';
}

function onPartnerProjectChange() {
  var proj = document.getElementById('partnerProjSelect').value;
  var benSel = document.getElementById('partnerBenSelect');
  benSel.innerHTML = '<option value="">— Select a beneficiary —</option>';
  document.getElementById('partner-content').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Επιλέξτε beneficiary.</p></div>';
  var btn = document.getElementById('partner-export-btn');
  if (btn) btn.style.display = 'none';
  if (!proj) return;
  var bens = PARTNER_DATA.data[proj] && PARTNER_DATA.data[proj].beneficiaries || {};
  Object.keys(bens).sort().forEach(function(short) {
    var o = document.createElement('option');
    o.value = short;
    o.textContent = short + (bens[short].orgName ? '  –  ' + bens[short].orgName.substring(0,50) : '');
    benSel.appendChild(o);
  });
}

function renderPartnerView() {
  var proj = document.getElementById('partnerProjSelect').value;
  var short = document.getElementById('partnerBenSelect').value;
  var wrap = document.getElementById('partner-content');
  if (!proj || !short) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">\uD83D\uDD0D</div><p>Select project and beneficiary.</p></div>';
    return;
  }
  var pd = PARTNER_DATA.data[proj];
  var ben = pd && pd.beneficiaries && pd.beneficiaries[short];
  if (!ben) { wrap.innerHTML = '<div class="empty"><p>No data found.</p></div>'; return; }
  var b = ben.budget || {};
  var wps = pd.wps || [];
  var eff = ben.effort || {};

  function eu(v) { return (v==null)?'\u2014':'\u20ac'+Number(v).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function pm(v) { return (!v)?'\u2014':Number(v).toLocaleString('el-GR',{minimumFractionDigits:1,maximumFractionDigits:1}); }
  function pc(v) { return (v==null)?'\u2014':(v*100).toFixed(2)+'%'; }

  var S = { wrap:'border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);',
            lbl:'background:var(--surface2);padding:7px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);',
            th:'padding:8px 14px;font-size:10px;text-transform:uppercase;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);background:var(--surface2);',
            td:'padding:9px 14px;border-bottom:1px solid rgba(48,54,61,0.6);color:var(--text2);font-size:12.5px;',
            num:'padding:9px 14px;border-bottom:1px solid rgba(48,54,61,0.6);text-align:right;font-family:JetBrains Mono,monospace;font-size:12px;color:var(--text);',
            hl:'background:rgba(227,179,65,0.07);',
            gold:'color:var(--gold);font-weight:600;' };

  var bdata = [
    ['A. Personnel costs A1/A2', eu(b.personnelA1), false],
    ['A. Personnel costs A3. Unit Cost', eu(b.personnelA3), false],
    ['A. Personnel costs A4. SMEs owners', eu(b.personnelA4), false],
    ['B. Subcontracting costs', eu(b.subcontracting), false],
    ['C.1 Travel and subsistence', eu(b.travel), false],
    ['C.2 Equipment', eu(b.equipment), false],
    ['C.3 Other goods, works and services', eu(b.otherGoods), false],
    ['D.1 Financial support to third parties', eu(b.financialSupport), false],
    ['D.2 Internally invoiced goods and services', eu(b.internallyInvoiced), false],
    ['E. Indirect costs', eu(b.indirectCosts), false],
    null,
    ['Total costs', eu(b.totalCosts), true],
    ['Funding rate %', b.fundingRate!=null?(b.fundingRate*100).toFixed(0)+'%':'\u2014', false],
    ['Maximum Grant amount', eu(b.maxGrant), true],
    ['% Other to Personnel', pc(b.pctOtherToPersonnel), false],
    ['Participation % of each Partner', pc(b.participationPct), false],
    null,
    ['Total PMs', pm(ben.totalPM), true],
    ['Average PM rate (\u20ac/PM)', eu(ben.avgPMrate), false]
  ];

  var btbody = bdata.map(function(r){
    if(!r) return '<tr><td colspan="2" style="padding:0;height:1px;background:var(--border)"></td></tr>';
    var hs = r[2] ? S.hl : '';
    var vs = r[2] ? S.gold : '';
    return '<tr style="'+hs+'"><td style="'+S.td+'">'+r[0]+'</td><td style="'+S.num+vs+'">'+r[1]+'</td></tr>';
  }).join('');

  var etbody = wps.map(function(wp){
    var v = eff[wp]||0;
    return '<tr><td style="'+S.td+'">'+wp+'</td><td style="'+S.num+(v?'':'color:var(--text3);')+'">'+pm(v)+'</td></tr>';
  }).join('');
  etbody += '<tr style="'+S.hl+'border-top:2px solid var(--border)"><td style="'+S.td+S.gold+'">Total PMs</td><td style="'+S.num+S.gold+'">'+pm(ben.totalPM)+'</td></tr>';

  var tc = b.type==='COO'?'var(--accent2)':b.type==='BEN'?'var(--accent)':'var(--accent3)';
  var badges = '<span style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:2px 9px;border-radius:20px">'+short+'</span>'
    + (b.country?'<span style="background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:2px 9px;border-radius:20px">'+b.country+'</span>':'')
    + (b.type?'<span style="background:var(--surface2);border:1px solid var(--border);font-size:11px;padding:2px 9px;border-radius:20px;color:'+tc+'">'+b.type+'</span>':'')
    + (b.uni?'<span style="background:var(--surface2);border:1px solid var(--border);color:var(--gold);font-size:11px;padding:2px 9px;border-radius:20px">'+b.uni+'</span>':'');

  wrap.innerHTML =
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px">'
    +'<div><div style="font-family:DM Serif Display,serif;font-size:16px;color:var(--text);margin-bottom:8px">'+(ben.orgName||short)+'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'+badges+'</div></div>'
    +'<button class="export-btn" onclick="exportPartnerView()">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
    +' Export Excel</button></div>'
    +'<div style="display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start">'
    +'<div style="'+S.wrap+'"><div style="'+S.lbl+'">Budget</div>'
    +'<table style="width:100%;border-collapse:collapse"><thead><tr>'
    +'<th style="'+S.th+'text-align:left">Cost Category</th>'
    +'<th style="'+S.th+'text-align:right">Amount</th>'
    +'</tr></thead><tbody>'+btbody+'</tbody></table></div>'
    +'<div style="'+S.wrap+'"><div style="'+S.lbl+'">Effort (Person-Months)</div>'
    +'<table style="width:100%;border-collapse:collapse"><thead><tr>'
    +'<th style="'+S.th+'text-align:left">Work Package</th>'
    +'<th style="'+S.th+'text-align:right">PMs</th>'
    +'</tr></thead><tbody>'+etbody+'</tbody></table></div>'
    +'</div>';
}



function switchView(viewId, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  el.classList.add('active');
  document.querySelector('.topbar-title').textContent = el.textContent.trim();
  // Hide project dropdown for views that have their own controls
  const noDropdown = ['uni-systems', 'effort', 'partner'];
  if (viewId === 'partner' && typeof initPartnerView === 'function') initPartnerView();
  const exportBtn = document.getElementById('topbar-export-btn');
  if (exportBtn) exportBtn.style.display = (viewId === 'basic-info') ? '' : 'none';

  const projSelWrap = document.querySelector('.topbar .select-wrap');
  if (projSelWrap) projSelWrap.style.display = noDropdown.includes(viewId) ? 'none' : '';
}

function fmt(v) {
  if (v === null || v === undefined) return '<span style="color:var(--text3)">—</span>';
  if (typeof v === 'number') {
    return typeof v === 'number' ? v.toLocaleString('el-GR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : v;
  }
  return v;
}

function fmtEuro(v) {
  if (v === null || v === undefined) return '<span style="color:var(--text3)">—</span>';
  return '€' + Number(v).toLocaleString('el-GR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtPct(v) {
  if (v === null || v === undefined) return '<span style="color:var(--text3)">—</span>';
  return (v * 100).toFixed(1) + '%';
}

function typeBadge(t) {
  if (!t) return '<span style="color:var(--text3)">—</span>';
  const cls = t === 'COO' ? 'badge-coo' : t === 'BEN' ? 'badge-ben' : 'badge-other';
  return `<span class="badge ${cls}">${t}</span>`;
}

function uniBadge(u) {
  if (!u || u.trim() === '') return '';
  return `<span class="badge badge-uni">${u.trim()}</span>`;
}

function pctBar(v) {
  if (v === null || v === undefined) return '<span style="color:var(--text3)">—</span>';
  const pct = Math.min(100, v * 100);
  return `<div class="pct-bar">
    <span style="font-family:JetBrains Mono,monospace;font-size:12px;color:var(--text2)">${pct.toFixed(1)}%</span>
    <div class="pct-fill"><div class="pct-fill-inner" style="width:${pct}%"></div></div>
  </div>`;
}

      totalIndirect = 0, totalCosts = 0, totalGrant = 0;

    totalEquip += r.equipment || 0;

    totalIndirect += r.indirectCosts || 0;
    totalCosts += r.totalCosts || 0;
    totalGrant += r.maxGrant || 0;

      <td style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px">${r.partNo || '—'}</td>
      <td style="white-space:normal;min-width:220px;max-width:280px;font-size:12px">${r.orgName || '—'}</td>

      <td style="color:var(--text2)">${r.country || '—'}</td>

      <td>${typeBadge(r.type)}</td>
      <td class="num">${r.personnelA1 ? '€'+Number(r.personnelA1).toLocaleString('el-GR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '<span style="color:var(--text3)">—</span>'}</td>
      <td class="num">${r.personnelA3 ? '€'+Number(r.personnelA3).toLocaleString('el-GR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '<span style="color:var(--text3)">—</span>'}</td>

      <td class="num">${r.otherGoods ? '€'+Number(r.otherGoods).toLocaleString('el-GR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '<span style="color:var(--text3)">—</span>'}</td>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Part. No</th>
            <th>Participant Organisation Name</th>
            <th>Short Name</th>
            <th>Country</th>
            <th>UNI</th>

    </div>
  `;

    </div>

  `;
}

function renderUniView() {
  const wrap = document.getElementById('uni-content');
  const projects = UNI_DATA.projects;
  const data = UNI_DATA.data;
  const allEntities = UNI_DATA.entities;
  const selectedEntity = document.getElementById('uniEntitySelect').value;

  // Determine which entities to show
  let entitiesToShow = selectedEntity === '__TOTAL__' ? allEntities : [selectedEntity];

  // Budget column keys
  const budCols = ['personnelA1','travel','equipment','otherGoods','indirectCosts','totalCosts','fundingRate','maxGrant'];

  // All WPs (from data)
  const allWPs = ['WP1','WP2','WP3','WP4','WP5','WP6','WP7','WP8','WP9','WP10'];

  function fmtEuro(v) {
    if (!v) return '<span style="color:var(--text3)">—</span>';
    return '€' + Number(v).toLocaleString('el-GR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function fmtNum(v, dec=1) {
    if (v === null || v === undefined || v === 0) return '<span style="color:var(--text3)">—</span>';
    return Number(v).toLocaleString('el-GR', {minimumFractionDigits:dec, maximumFractionDigits:dec});
  }
  function fmtPct(v) {
    if (v === null || v === undefined) return '<span style="color:var(--text3)">—</span>';
    return (v*100).toFixed(0)+'%';
  }

  // ── Aggregate data per project for the current selection ──────────────────
  function aggregateProject(proj) {
    const pd = data[proj];
    if (!pd) return null;
    const agg = { budget: {}, effort: {}, totalEffort: 0, avgPM: null, hasData: false };
    budCols.forEach(k => agg.budget[k] = 0);
    let fundRateSum = 0, fundRateCount = 0;
    entitiesToShow.forEach(e => {
      const ed = pd.entities?.[e];
      if (!ed) return;
      agg.hasData = true;
      budCols.forEach(k => {
        if (k === 'fundingRate') { if (ed.budget?.[k]) { fundRateSum += ed.budget[k]; fundRateCount++; } }
        else agg.budget[k] = (agg.budget[k] || 0) + (ed.budget?.[k] || 0);
      });
      allWPs.forEach(wp => {
        agg.effort[wp] = (agg.effort[wp] || 0) + (ed.effort?.[wp] || 0);
      });
      agg.totalEffort += ed.totalEffort || 0;
    });
    agg.budget.fundingRate = fundRateCount > 0 ? fundRateSum / fundRateCount : null;
    const pers = agg.budget.personnelA1 || 0;
    agg.avgPM = agg.totalEffort > 0 ? Math.round(pers / agg.totalEffort * 100) / 100 : null;
    return agg;
  }

  // ── Grand totals ──────────────────────────────────────────────────────────
  const grandBudget = {};
  budCols.forEach(k => grandBudget[k] = 0);
  let grandEffort = {}, grandTotal = 0;
  allWPs.forEach(wp => grandEffort[wp] = 0);
  let projectsWithData = 0;

  projects.forEach(proj => {
    const agg = aggregateProject(proj);
    if (!agg || !agg.hasData) return;
    projectsWithData++;
    budCols.forEach(k => { if (k !== 'fundingRate') grandBudget[k] += agg.budget[k] || 0; });
    allWPs.forEach(wp => grandEffort[wp] += agg.effort[wp] || 0);
    grandTotal += agg.totalEffort;
  });

  // ── Active WPs (those with any data) ────────────────────────────────────
  const activeWPs = allWPs.filter(wp => grandEffort[wp] > 0);

  // ── Header summary ────────────────────────────────────────────────────────
  const label = selectedEntity === '__TOTAL__' ? 'TOTAL (All Entities)' : selectedEntity;
  let html = `
    <div class="uni-header-bar">
      <div class="uni-summary-pills">
        <div class="uni-pill">
          <span class="uni-pill-label">Total Budget</span>
          <span class="uni-pill-val" style="color:var(--accent)">€${Number(grandBudget.totalCosts).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>

        <div class="uni-pill">

          <span class="uni-pill-val" style="color:var(--accent2)">€${Number(grandBudget.maxGrant).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>

        <div class="uni-pill">

          <span class="uni-pill-label">Projects</span>

  html += `<div class="uni-tables-row">`;

  // BUDGET TABLE
  html += `<div class="uni-table-wrap" style="flex:2.2">

        <th class="num">Total Effort</th>
        <th class="num">Avg PM (€)</th>
      </tr></thead>
      <tbody>`;

  projects.forEach(proj => {
    const agg = aggregateProject(proj);
    if (!agg || !agg.hasData) {
      html += `<tr class="uni-row-empty"><td style="color:var(--text3);font-size:12px">${proj}</td><td colspan="10" style="text-align:center;color:var(--text3);font-size:11px">—</td></tr>`;
      return;
    }
    const b = agg.budget;
    html += `<tr class="uni-row">
      <td><strong style="font-size:12.5px">${proj}</strong></td>
      <td class="num">${fmtEuro(b.personnelA1)}</td>
      <td class="num">${fmtEuro(b.travel)}</td>
      <td class="num">${fmtEuro(b.equipment)}</td>

      <td class="num">${fmtEuro(b.indirectCosts)}</td>
      <td class="num" style="color:var(--gold);font-weight:600">${fmtEuro(b.totalCosts)}</td>
      <td class="num">${fmtPct(b.fundingRate)}</td>
      <td class="num" style="color:var(--accent2)">${fmtEuro(b.maxGrant)}</td>
      <td class="num">${fmtNum(agg.totalEffort, 1)}</td>

    </tr>`;
  });

  html += `<tr class="uni-totals-row">
    <td>ΣΥΝΟΛΑ</td>
    <td class="num">€${Number(grandBudget.personnelA1).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
    <td class="num">€${Number(grandBudget.travel).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>

      <tbody>`;

    const agg = aggregateProject(proj);

    </tr>`;
  });

  html += `<tr class="uni-totals-row">
    <td>ΣΥΝΟΛΑ</td>
    ${activeWPs.map(wp => `<td class="num">${grandEffort[wp] ? Number(grandEffort[wp]).toLocaleString('el-GR',{minimumFractionDigits:1,maximumFractionDigits:1}) : '—'}</td>`).join('')}

  </tr>`;

  html += `</tbody></table></div></div>`;
  html += `</div>`; // uni-tables-row

  wrap.innerHTML = html;
}

function initUniView() {
  // Populate entity dropdown dynamically
  const sel = document.getElementById('uniEntitySelect');
  sel.innerHTML = '';
  // Add TOTAL option first
  const totalOpt = document.createElement('option');
  totalOpt.value = '__TOTAL__';
  totalOpt.textContent = 'TOTAL (All Entities)';
  sel.appendChild(totalOpt);
  // Add each entity
  UNI_DATA.entities.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e;
    opt.textContent = e;
    sel.appendChild(opt);
  });
  renderUniView();
}

  const wrap = document.getElementById('effort-content');
  if (!proj) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>Επιλέξτε έργο από το dropdown.</p></div>';
    return;
  }
  const pd = EFFORT_DATA.data[proj];
  if (!pd) { wrap.innerHTML = '<div class="empty"><p>Δεν βρέθηκαν δεδομένα.</p></div>'; return; }

  const wps = pd.wps;
  const partners = pd.partners;

  // Column totals
  const wpTotals = {};
  wps.forEach(wp => wpTotals[wp] = 0);
  let grandTotal = 0;
  partners.forEach(p => {
    wps.forEach(wp => { wpTotals[wp] += p.wps[wp] || 0; });
    grandTotal += p.total || 0;
  });

  function fn(v, dec=1) {
    if (!v) return '<span style="color:var(--text3)">—</span>';
    return Number(v).toLocaleString('el-GR', {minimumFractionDigits:dec, maximumFractionDigits:dec});
  }

  // Heatmap: find max for color scaling
  const allVals = partners.flatMap(p => wps.map(wp => p.wps[wp] || 0)).filter(v => v > 0);
  const maxVal = allVals.length ? Math.max(...allVals) : 1;

  function heatColor(v) {
    if (!v) return '';
    const intensity = v / maxVal;
    const alpha = 0.08 + intensity * 0.30;
    return `background:rgba(88,166,255,${alpha.toFixed(2)})`;
  }

  let html = `
    <div class="effort-header">
      <div class="effort-kpis">
        <div class="effort-kpi">
          <div class="effort-kpi-label">Partners</div>
          <div class="effort-kpi-val">${partners.length}</div>
        </div>
        <div class="effort-kpi">
          <div class="effort-kpi-label">Work Packages</div>
          <div class="effort-kpi-val">${wps.length}</div>
        </div>
        <div class="effort-kpi">
          <div class="effort-kpi-label">Total Effort</div>
          <div class="effort-kpi-val" style="color:var(--gold)">${Number(grandTotal).toLocaleString('el-GR',{minimumFractionDigits:1,maximumFractionDigits:1})} PM</div>
        </div>
      </div>
    </div>

    <div class="effort-table-wrap">
      <table class="effort-table">
        <thead>
          <tr>
            <th class="ef-th-no">No</th>
            <th class="ef-th-partner">Partner</th>
            <th class="ef-th-short">Short</th>
            <th class="ef-th-country">Country</th>
            ${wps.map(wp => `<th class="ef-th-wp">${wp}</th>`).join('')}
            <th class="ef-th-total">Total</th>
          </tr>
        </thead>
        <tbody>`;

  partners.forEach((p, idx) => {
    const rowTotal = p.total || 0;
    const rowPct = grandTotal > 0 ? (rowTotal / grandTotal * 100) : 0;
    html += `<tr class="ef-row">
      <td class="ef-no">${p.partNo !== null && p.partNo !== undefined ? p.partNo : idx+1}</td>
      <td class="ef-partner" data-tooltip="${p.orgName}">${p.orgName || p.short}</td>
      <td class="ef-short"><span class="ef-short-badge">${p.short || '—'}</span></td>
      <td class="ef-country">${p.country || '—'}</td>
      ${wps.map(wp => {
        const v = p.wps[wp] || 0;
        return `<td class="ef-wp-cell" style="${heatColor(v)}">${v ? fn(v) : '<span style="color:var(--text3);opacity:.4">—</span>'}</td>`;
      }).join('')}
      <td class="ef-total">
        <div class="ef-total-wrap">
          <span>${fn(rowTotal)}</span>
          <div class="ef-bar"><div class="ef-bar-fill" style="width:${rowPct.toFixed(1)}%"></div></div>
        </div>
      </td>
    </tr>`;
  });

  // Totals row
  html += `<tr class="ef-totals-row">
    <td colspan="4">ΣΥΝΟΛΑ</td>
    ${wps.map(wp => `<td class="ef-wp-cell">${fn(wpTotals[wp])}</td>`).join('')}
    <td class="ef-total"><strong>${Number(grandTotal).toLocaleString('el-GR',{minimumFractionDigits:1,maximumFractionDigits:1})}</strong></td>
  </tr>`;

  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
}

function exportCurrentView() {

  const info = DATA.info[proj] || {};
  const budget = DATA.budget[proj] || [];
  const infoRows = [
    ['Field','Value'],
    ['Acronym', info.Acronym||''], ['Call', info.Call||''], ['Number', info.Number||''],
    ['Title', info.Title||''], ['Duration (months)', info.Duration||''],
    ['Indirect Rate', info.Indirectrate ? (info.Indirectrate*100).toFixed(0)+'%' : ''],
    ['Type of Action', info.Typeofaction||''], ['Topic', info.Topic||''],
    ['Keywords', info.Keywords1||''], ['Description', info.Description||''],
  ];
  const bh = ['Part.No','Org Name','Short','Country','UNI','Type',
    'Personnel A1/A2','Personnel A3','Personnel A4','Subcontracting',
    'Travel','Equipment','Other Goods','Financial Support','Internally Invoiced',
    'Indirect','Total Costs','Funding Rate %','Max Grant','% Other/Personnel','Participation %'];
  const budgetRows = [bh, ...budget.map(r => [
    r.partNo,r.orgName,r.shortName,r.country,r.uni||'',r.type,
    r.personnelA1,r.personnelA3,r.personnelA4,r.subcontracting,
    r.travel,r.equipment,r.otherGoods,r.financialSupport,r.internallyInvoiced,
    r.indirectCosts,r.totalCosts,
    r.fundingRate ? (r.fundingRate*100).toFixed(0)+'%' : '',
    r.maxGrant,
    r.pctOtherToPersonnel ? (r.pctOtherToPersonnel*100).toFixed(1)+'%' : '',
    r.participationPct ? (r.participationPct*100).toFixed(1)+'%' : '',
  ])];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoRows), 'Basic Info');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(budgetRows), 'Budget');
  XLSX.writeFile(wb, proj+'_dashboard.xlsx');
}

function exportUniView() {
  const entity = document.getElementById('uniEntitySelect').value;
  const projects = UNI_DATA.projects;
  const allEntities = UNI_DATA.entities;
  const entitiesToShow = entity === '__TOTAL__' ? allEntities : [entity];
  const allWPs = ['WP1','WP2','WP3','WP4','WP5','WP6','WP7','WP8','WP9','WP10'];
  function agg(proj) {
    const pd = UNI_DATA.data[proj]; if (!pd) return null;
    const r = {b:{personnelA1:0,travel:0,equipment:0,otherGoods:0,indirectCosts:0,totalCosts:0,maxGrant:0},e:{},t:0,ok:false};
    entitiesToShow.forEach(e => {
      const ed = pd.entities?.[e]; if (!ed) return; r.ok=true;
      Object.keys(r.b).forEach(k => r.b[k]+=(ed.budget?.[k]||0));
      allWPs.forEach(wp => r.e[wp]=(r.e[wp]||0)+(ed.effort?.[wp]||0));
      r.t+=ed.totalEffort||0;
    });
    return r;
  }
  const activeWPs = allWPs.filter(wp => projects.some(p => { const a=agg(p); return a&&a.e[wp]>0; }));
  const label = entity==='__TOTAL__'?'TOTAL':entity;
  const bRows = [['Project','Personnel A1/A2','Travel','Equipment','Other Goods','Indirect','Total Costs','Max Grant','Total PM','Avg PM (€)']];
  const eRows = [['Project',...activeWPs,'Total PM']];
  projects.forEach(proj => {
    const a=agg(proj); if (!a||!a.ok) return;
    bRows.push([proj,a.b.personnelA1,a.b.travel,a.b.equipment,a.b.otherGoods,a.b.indirectCosts,a.b.totalCosts,a.b.maxGrant,a.t,a.t>0?Math.round(a.b.personnelA1/a.t*100)/100:'']);
    eRows.push([proj,...activeWPs.map(wp=>a.e[wp]||0),a.t]);
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bRows), 'Budget '+label);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eRows), 'Effort '+label);
  XLSX.writeFile(wb, 'UniSystems_'+label.replace(' ','_')+'.xlsx');
}

function exportEffortView() {
  const proj = document.getElementById('effortProjectSelect').value;
  if (!proj) { alert('Επιλέξτε πρώτα ένα έργο.'); return; }
  const pd = EFFORT_DATA.data[proj]; if (!pd) return;
  const wps = pd.wps;
  const rows = [['No','Organisation','Short','Country',...wps,'Total PM'],
    ...pd.partners.map(p=>[p.partNo,p.orgName,p.short,p.country,...wps.map(wp=>p.wps[wp]||0),p.total]),
    ['','ΣΥΝΟΛΑ','','',...wps.map(wp=>pd.partners.reduce((s,p)=>s+(p.wps[wp]||0),0)),pd.partners.reduce((s,p)=>s+p.total,0)]
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Effort '+proj);
  XLSX.writeFile(wb, proj+'_effort.xlsx');
}
